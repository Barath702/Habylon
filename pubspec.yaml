name: habylon
description: A minimalist habit tracking app with neon-glass editorial design
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.2
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Animation
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  shimmer: ^3.0.0
  
  # Icons
  material_design_icons_flutter: ^7.0.7296
  
  # Image Picker
  image_picker: ^1.1.2
  
  # File operations
  path_provider: ^2.1.3
  file_picker: ^8.0.5
  
  # URL Launcher
  url_launcher: ^6.3.0
  
  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.13.1
  
flutter:
  uses-material-design: true



flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"